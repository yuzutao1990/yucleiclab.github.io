<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Yucleic Lab</title>
    <link rel="stylesheet" href="styles/style.css">
    <script>
        // Function to load header and footer from external files
        function loadHTML(element, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => document.querySelector(element).innerHTML = data);
        }

        // Load header and footer after the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            loadHTML('#header', 'partials/header.html');
            loadHTML('#footer', 'partials/footer.html');
        });
    </script>
</head>
<body>
    <!-- The header will be inserted dynamically here -->
    <div id="header"></div>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <div class="container" style="text-align: center;">
            <h2>Contact Us</h2>
            <div style="margin: 20px auto; max-width: 600px;">
                <p style="font-size: 1.2em; margin: 10px 0;">Email: <a href="mailto:zy323@cam.ac.uk">zy323@cam.ac.uk</a></p>
                <p style="font-size: 1.2em; margin: 10px 0;">Address:</p>
                <p style="font-size: 1.2em; margin: 10px 0;">Genome Institute of Singapore</p>
                <p style="font-size: 1.2em; margin: 10px 0;">60 Biopolis Street, Genome, #02-01</p>
                <p style="font-size: 1.2em; margin: 10px 0;">Singapore 138672</p>
            </div>

            <!-- Contact Form -->
            <form action="https://formspree.io/f/your-form-id" method="POST" style="max-width: 600px; margin: 20px auto; text-align: left;">
                <label for="name" style="display: block; font-size: 1.2em; margin: 10px 0;">Name:</label>
                <input type="text" id="name" name="name" required style="width: 100%; padding: 10px; font-size: 1em; margin-bottom: 20px;">

                <label for="email" style="display: block; font-size: 1.2em; margin: 10px 0;">Email:</label>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; font-size: 1em; margin-bottom: 20px;">

                <label for="message" style="display: block; font-size: 1.2em; margin: 10px 0;">Message:</label>
                <textarea id="message" name="message" required style="width: 100%; padding: 10px; font-size: 1em; margin-bottom: 20px; height: 150px;"></textarea>

                <button type="submit" style="display: block; width: 100%; padding: 10px; font-size: 1.2em; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Send</button>
            </form>
        </div>
    </section>

    <!-- The footer will be inserted dynamically here -->
    <div id="footer"></div>
</body>
</html>
