title: Yucleic Lab
description: Nucleic acids chemical biology at GIS, Singapore
url: https://www.yucleiclab.com
baseurl: ""

# REMOVE theme and remote_theme entirely - this template is self-contained
theme: null

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

# tell Jekyll to include underscore folders so CSS/JS actually gets built
include:
  - _styles
  - _scripts

# tell Jekyll not to process these folders as pages
exclude:
  - _cite
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

defaults:
  - scope:
      path: ""
    values:
      layout: default

locale: en
markdown: kramdown
kramdown:
  input: GFM

author:
  name: Yucleic Lab

collections:
  members:
    output: true
  pages:
    output: true
    permalink: /:title/

header-dark: true
