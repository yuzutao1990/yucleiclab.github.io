title: Yucleic Lab
description: Nucleic acids chemical biology at GIS, Singapore
url: https://www.yucleiclab.com
baseurl: ""

# REMOVE theme and remote_theme entirely - this template is self-contained
theme: null

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

# tell Jekyll to include underscore folders so CSS/JS actually gets built
include:
  - _styles
  - _scripts

# tell Jekyll not to process these folders as pages
exclude:
  - _cite
  - Gemfile
  - Gemfile.lock
  - README.md

locale: en
markdown: kramdown
kramdown:
  input: GFM

author:
  name: Yucleic Lab

nav:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: Members
    url: /members/
  - title: Publications
    url: /publications/
  - title: Join Us
    url: /join/

collections:
  pages:
    output: true
    permalink: /:title/
